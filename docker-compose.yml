services:
  backend:
    build: ./backend
    container_name: propintel-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/database:/app/database

  frontend:
    build: ./frontend
    container_name: propintel-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend